<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ogden 850 · 背单词</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0d0d;
  --card-bg: #1a1a1a;
  --text: #e0d6c8;
  --text-dim: #8a8070;
  --gold: #c8a97e;
  --gold-dim: #8a7050;
  --border: #2a2520;
  --correct: #4a7c59;
  --wrong: #8b4a4a;
  --btn-bg: #222;
  --btn-hover: #2a2a2a;
}
.light {
  --bg: #f5f0ea;
  --card-bg: #fff;
  --text: #3a3028;
  --text-dim: #8a8070;
  --border: #e0d6c8;
  --btn-bg: #f0ebe0;
  --btn-hover: #e8e0d0;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'DM Sans', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  transition: background 0.3s, color 0.3s;
}

/* Header */
header {
  width: 100%;
  max-width: 700px;
  padding: 24px 20px 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.4rem;
  font-weight: 600;
  color: var(--gold);
  letter-spacing: 0.02em;
}
.header-right {
  display: flex;
  align-items: center;
  gap: 10px;
}
.theme-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-dim);
  padding: 5px 10px;
  border-radius: 16px;
  cursor: pointer;
  font-size: 0.8rem;
  font-family: inherit;
}

/* Progress bar */
.progress-wrap {
  width: 100%;
  max-width: 700px;
  padding: 10px 20px;
}
.progress-info {
  display: flex;
  justify-content: space-between;
  font-size: 0.75rem;
  color: var(--text-dim);
  margin-bottom: 4px;
}
.progress-bar {
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--gold);
  border-radius: 2px;
  transition: width 0.3s;
}

/* Category tabs */
.tabs {
  width: 100%;
  max-width: 700px;
  padding: 8px 20px;
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.tab {
  padding: 6px 14px;
  border-radius: 18px;
  font-size: 0.75rem;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--btn-bg);
  color: var(--text-dim);
  font-family: inherit;
  transition: all 0.2s;
  white-space: nowrap;
}
.tab:hover { border-color: var(--gold-dim); }
.tab.active { background: var(--gold); color: #0d0d0d; border-color: var(--gold); font-weight: 600; }
.tab .count { font-size: 0.65rem; opacity: 0.7; }

/* Flashcard */
.card-area {
  width: 100%;
  max-width: 700px;
  padding: 20px;
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.card {
  width: 100%;
  max-width: 440px;
  min-height: 280px;
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 40px 32px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.3s;
  position: relative;
  user-select: none;
}
.card:hover { border-color: var(--gold-dim); transform: translateY(-2px); }
.card.flipped { border-color: var(--gold); }

.speak-btn {
  background: none;
  border: none;
  cursor: pointer;
  padding: 4px;
  color: var(--gold-dim);
  transition: color 0.2s;
  display: inline-flex;
  align-items: center;
  margin-left: 10px;
  vertical-align: middle;
}
.speak-btn:hover { color: var(--gold); }
.speak-btn svg { width: 20px; height: 20px; }
.speak-btn-small svg { width: 16px; height: 16px; }
.speak-btn-small {
  margin-left: 6px;
  padding: 2px;
}

.card-word {
  font-family: 'Cormorant Garamond', serif;
  font-size: 2.8rem;
  font-weight: 700;
  color: var(--text);
  letter-spacing: 0.01em;
  margin-bottom: 8px;
}
.card-phonetic {
  font-size: 0.9rem;
  color: var(--gold-dim);
  margin-bottom: 12px;
  font-style: italic;
}
.card-hint {
  font-size: 0.7rem;
  color: var(--text-dim);
  opacity: 0.5;
  margin-top: 8px;
}

/* Card back */
.card-back {
  display: none;
  flex-direction: column;
  align-items: center;
  text-align: center;
  width: 100%;
}
.card.flipped .card-front { display: none; }
.card.flipped .card-back { display: flex; }
.card.flipped .card-hint { display: none; }

.card-zh {
  font-size: 1.5rem;
  font-weight: 600;
  color: var(--gold);
  margin-bottom: 12px;
}
.card-en-def {
  font-size: 0.9rem;
  color: var(--text-dim);
  margin-bottom: 16px;
  line-height: 1.5;
}
.card-core {
  font-size: 0.85rem;
  color: var(--text);
  opacity: 0.7;
  margin-bottom: 16px;
  padding: 10px 16px;
  background: rgba(200,169,126,0.06);
  border-radius: 8px;
  line-height: 1.5;
}
.card-example {
  font-size: 0.85rem;
  color: var(--text);
  font-style: italic;
  margin-bottom: 4px;
}
.card-example-zh {
  font-size: 0.8rem;
  color: var(--text-dim);
}

/* Buttons after flip */
.card-actions {
  display: none;
  gap: 16px;
  margin-top: 24px;
}
.card.flipped .card-actions { display: flex; }

.btn {
  padding: 12px 32px;
  border-radius: 24px;
  font-size: 0.9rem;
  cursor: pointer;
  border: none;
  font-family: inherit;
  font-weight: 500;
  transition: all 0.2s;
}
.btn-know {
  background: var(--correct);
  color: #fff;
}
.btn-know:hover { filter: brightness(1.1); }
.btn-dunno {
  background: var(--wrong);
  color: #fff;
}
.btn-dunno:hover { filter: brightness(1.1); }

/* Stats + review */
.controls {
  width: 100%;
  max-width: 700px;
  padding: 0 20px 20px;
  display: flex;
  justify-content: center;
  gap: 12px;
  flex-wrap: wrap;
}
.ctrl-btn {
  padding: 8px 20px;
  border-radius: 20px;
  font-size: 0.8rem;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--btn-bg);
  color: var(--text-dim);
  font-family: inherit;
  transition: all 0.2s;
}
.ctrl-btn:hover { border-color: var(--gold-dim); color: var(--text); }
.ctrl-btn.active-review { background: var(--gold-dim); color: #fff; border-color: var(--gold-dim); }

.stats {
  text-align: center;
  font-size: 0.75rem;
  color: var(--text-dim);
  padding-bottom: 20px;
}

/* Empty state */
.empty {
  text-align: center;
  color: var(--text-dim);
  padding: 60px 20px;
}
.empty h2 { font-family: 'Cormorant Garamond', serif; color: var(--gold); margin-bottom: 8px; }
.card-round-complete {
  display: none;
  flex-direction: column;
  align-items: center;
  text-align: center;
  width: 100%;
}
.card-round-complete .round-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.6rem;
  color: var(--gold);
  margin-bottom: 16px;
}
.card-round-complete .round-stats {
  font-size: 0.85rem;
  color: var(--text-dim);
  margin-bottom: 24px;
  line-height: 1.8;
}

/* Responsive */
@media (max-width: 480px) {
  .card { min-height: 240px; padding: 30px 24px; }
  .speak-btn {
  background: none;
  border: none;
  cursor: pointer;
  padding: 4px;
  color: var(--gold-dim);
  transition: color 0.2s;
  display: inline-flex;
  align-items: center;
  margin-left: 10px;
  vertical-align: middle;
}
.speak-btn:hover { color: var(--gold); }
.speak-btn svg { width: 20px; height: 20px; }
.speak-btn-small svg { width: 16px; height: 16px; }
.speak-btn-small {
  margin-left: 6px;
  padding: 2px;
}

.card-word { font-size: 2.2rem; }
  .card-zh { font-size: 1.3rem; }
}
</style>
</head>
<body>

<header>
  <h1>Ogden's Basic English</h1>
  <div class="header-right">
    <button class="theme-btn" onclick="toggleTheme()" title="切换明暗主题">◐</button>
  </div>
</header>

<div class="progress-wrap">
  <div class="progress-info">
    <span id="progressLabel">Loading...</span>
    <span id="progressPercent">0%</span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
</div>

<div class="tabs" id="tabs"></div>

<div class="card-area">
  <div class="card" id="card" onclick="flipCard()">
    <div class="card-front">
      <div style="display:flex;align-items:center;justify-content:center;">
        <div class="card-word" id="cardWord">—</div>
        <button class="speak-btn" onclick="event.stopPropagation();speakWord()" title="听发音">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M11 5L6 9H2v6h4l5 4V5z"/>
            <path d="M19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.07"/>
          </svg>
        </button>
      </div>
      <div class="card-phonetic" id="cardPhonetic"></div>
    </div>
    <div class="card-back">
      <div class="card-zh" id="cardZh"></div>
      <div class="card-en-def" id="cardEnDef"></div>
      <div class="card-core" id="cardCore"></div>
      <div style="display:flex;align-items:center;justify-content:center;">
        <div class="card-example" id="cardEx"></div>
        <button class="speak-btn speak-btn-small" onclick="event.stopPropagation();speakExample()" title="听例句">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M11 5L6 9H2v6h4l5 4V5z"/>
            <path d="M19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.07"/>
          </svg>
        </button>
      </div>
      <div class="card-example-zh" id="cardExZh"></div>
      <div class="card-actions">
        <button class="btn btn-dunno" onclick="event.stopPropagation(); markWord(false)">不认识</button>
        <button class="btn btn-know" onclick="event.stopPropagation(); markWord(true)">认识</button>
      </div>
    </div>
    <div class="card-hint">点击翻转查看释义</div>
  </div>
</div>

<div class="controls">
  <button class="ctrl-btn" id="btnNextRound" onclick="nextRound()">下一轮 (N)</button>
  <button class="ctrl-btn" id="btnReview" onclick="toggleReview()">复习模式</button>
  <button class="ctrl-btn" onclick="exportProgress()">导出进度</button>
  <button class="ctrl-btn" onclick="document.getElementById('importFile').click()">导入进度</button>
  <input type="file" id="importFile" accept=".json" style="display:none" onchange="importProgress(event)">
  <button class="ctrl-btn" onclick="resetProgress()">重置进度</button>
</div>

<div class="stats" id="stats"></div>

<script>
// ==================== DATA ====================
const WORDS = [{"w": "come", "c": "op", "zh": "来,前来", "en": "move toward the speaker or a place", "ex": "Come here when you're ready.", "exz": "准备好了就过来。", "s": ["arrive", "approach", "reach"], "core": "朝说话者或目标靠近，让彼此距离变短。"}, {"w": "get", "c": "op", "zh": "得到,获得;变得", "en": "obtain, become, or receive", "ex": "I'll get a new book tomorrow.", "exz": "我明天会买本新书。", "s": ["obtain", "receive", "acquire"], "core": "把东西收到手里，或让状态变成新的样子。"}, {"w": "give", "c": "op", "zh": "给,赠予", "en": "transfer something to another", "ex": "Please give me your hand.", "exz": "请把手伸给我。", "s": ["offer", "hand", "present"], "core": "把自己这边的东西交到别人那边，让所有权换手。"}, {"w": "go", "c": "op", "zh": "去,离开", "en": "move away or proceed", "ex": "We go to school every day.", "exz": "我们每天都去学校。", "s": ["leave", "depart", "proceed"], "core": "离开当前位置，朝另一个地方移动过去。"}, {"w": "keep", "c": "op", "zh": "保持,保留", "en": "hold or maintain in a state", "ex": "Keep the door open, please.", "exz": "请让门开着。", "s": ["hold", "retain", "maintain"], "core": "把东西或状态留住，不让它跑掉或改变。"}, {"w": "let", "c": "op", "zh": "让,允许", "en": "allow or permit", "ex": "Let me try it once more.", "exz": "让我再试一次。", "s": ["allow", "permit", "enable"], "core": "把拦住的门打开，让别人可以自由去做某事。"}, {"w": "make", "c": "op", "zh": "做,制造", "en": "create, build, or cause", "ex": "She made a cake for us.", "exz": "她为我们做了个蛋糕。", "s": ["create", "build", "produce"], "core": "动手造成一个东西，或让事情变成某种样子。"}, {"w": "put", "c": "op", "zh": "放,置", "en": "place in a position", "ex": "Put the book on the table.", "exz": "把书放在桌上。", "s": ["place", "set", "lay"], "core": "把东西安放到某个位置上，让它停在那里。"}, {"w": "seem", "c": "op", "zh": "似乎,看起来", "en": "appear or give the impression", "ex": "You seem tired today.", "exz": "你今天看起来很累。", "s": ["appear", "look", "feel like"], "core": "外表给人一种感觉，像是某种情况正在那里。"}, {"w": "take", "c": "op", "zh": "拿,带走", "en": "grasp, carry, or accept", "ex": "Take this letter to her.", "exz": "把这封信带给她。", "s": ["grab", "carry", "accept"], "core": "伸手拿住并带走，或把递来的东西接过来。"}, {"w": "be", "c": "op", "zh": "是,存在", "en": "exist or have a state", "ex": "To be or not to be.", "exz": "生存还是毁灭。", "s": ["exist", "stay", "remain"], "core": "人或东西就在那里，并处在某种样子里。"}, {"w": "do", "c": "op", "zh": "做,执行", "en": "perform an action", "ex": "Do your work first.", "exz": "先做你的工作。", "s": ["perform", "act", "carry out"], "core": "把想做的事落到手上，真的动起来完成它。"}, {"w": "have", "c": "op", "zh": "有,拥有", "en": "possess or hold", "ex": "I have two sisters.", "exz": "我有两个姐妹。", "s": ["own", "possess", "hold"], "core": "某物在自己这边，归自己掌握或随身带着。"}, {"w": "say", "c": "op", "zh": "说,讲", "en": "speak or state aloud", "ex": "What did you say to him?", "exz": "你对他说了什么?", "s": ["speak", "tell", "state"], "core": "把心里的话用声音或文字送到外面，让别人接到。"}, {"w": "see", "c": "op", "zh": "看见,理解", "en": "perceive with eyes or mind", "ex": "I see what you mean.", "exz": "我明白你的意思了。", "s": ["look", "view", "understand"], "core": "眼睛接住画面，心里也可能跟着看明白。"}, {"w": "send", "c": "op", "zh": "送,寄", "en": "cause to go or be delivered", "ex": "Send the parcel by post.", "exz": "通过邮寄把包裹寄出去。", "s": ["dispatch", "mail", "forward"], "core": "让人或东西从这里出发，去到指定的另一边。"}, {"w": "may", "c": "op", "zh": "可以,可能", "en": "possibility or permission", "ex": "You may go now.", "exz": "你现在可以走了。", "s": ["can", "might", "could"], "core": "门没有关死，事情有机会发生，也可能被允许。"}, {"w": "will", "c": "op", "zh": "将,会", "en": "future or intention", "ex": "I will help you.", "exz": "我会帮你的。", "s": ["shall", "intend to", "be going to"], "core": "意愿或安排朝将来伸出去，准备在那里发生。"}, {"w": "about", "c": "op", "zh": "关于,大约", "en": "concerning or approximately", "ex": "Tell me about your trip.", "exz": "跟我说说你的旅行。", "s": ["concerning", "regarding", "around"], "core": "话题围着某件事转，数量也可能只在附近。"}, {"w": "across", "c": "op", "zh": "穿过,横越", "en": "from one side to another", "ex": "Walk across the bridge.", "exz": "从桥上走过去。", "s": ["over", "through", "beyond"], "core": "从一边横过去，穿过中间来到另一边那头。"}, {"w": "after", "c": "op", "zh": "在...之后", "en": "later in time or behind", "ex": "Come after lunch.", "exz": "午饭后过来。", "s": ["following", "behind", "later than"], "core": "跟在某时某物后面，顺序落在它的后头。"}, {"w": "against", "c": "op", "zh": "反对,靠着", "en": "in opposition to or touching", "ex": "The ladder leans against the wall.", "exz": "梯子靠在墙上。", "s": ["opposing", "versus", "contrary to"], "core": "迎着相反力量顶上去，或身体贴到某物上。"}, {"w": "among", "c": "op", "zh": "在...之中", "en": "in the middle of a group", "ex": "She is popular among her friends.", "exz": "她在朋友中很受欢迎。", "s": ["amid", "amongst", "between"], "core": "被一群人或物围住，落在它们中间的位置。"}, {"w": "at", "c": "op", "zh": "在,于", "en": "specific location or time", "ex": "Meet me at the station.", "exz": "在车站见我。", "s": ["by", "near", "in"], "core": "把目光钉在一个精确的点上，可能是地点或时刻。"}, {"w": "before", "c": "op", "zh": "在...之前", "en": "earlier in time or position", "ex": "Wash hands before eating.", "exz": "吃饭前先洗手。", "s": ["prior to", "ahead of", "earlier"], "core": "排在某事前面，时间或位置都更早一些。"}, {"w": "between", "c": "op", "zh": "在...之间", "en": "in the space separating two things", "ex": "Sit between us.", "exz": "坐在我们中间。", "s": ["amid", "amongst", "in the middle of"], "core": "落在两个东西中间，被两边夹在当中位置。"}, {"w": "by", "c": "op", "zh": "通过,在旁", "en": "via, near, or no later than", "ex": "The book was written by her.", "exz": "这本书是她写的。", "s": ["via", "through", "beside"], "core": "靠在某处旁边，或借某条路、某个人完成。"}, {"w": "down", "c": "op", "zh": "向下,在下", "en": "to or in a lower position", "ex": "Sit down, please.", "exz": "请坐下。", "s": ["downward", "below", "lower"], "core": "朝低处去，位置顺着方向一点点往下落。"}, {"w": "from", "c": "op", "zh": "从,来自", "en": "indicating origin or starting point", "ex": "I come from China.", "exz": "我来自中国。", "s": ["out of", "starting at", "since"], "core": "离开起点，带着来源的痕迹一路向外出来。"}, {"w": "in", "c": "op", "zh": "在...里", "en": "inside or within", "ex": "She is in the room.", "exz": "她在房间里。", "s": ["inside", "within", "into"], "core": "被放进里面，处在边界包住的空间之中。"}, {"w": "off", "c": "op", "zh": "离开,关", "en": "away from or disconnected", "ex": "Turn off the light.", "exz": "把灯关掉。", "s": ["away", "apart", "disconnected"], "core": "从接触处脱开，离开原来的连接或开关。"}, {"w": "on", "c": "op", "zh": "在...上,开", "en": "in contact with the surface", "ex": "The cat is on the chair.", "exz": "猫在椅子上。", "s": ["upon", "atop", "over"], "core": "贴在表面上，或让机器进入工作状态里。"}, {"w": "over", "c": "op", "zh": "在...上方,超过", "en": "above or more than", "ex": "The plane flew over the city.", "exz": "飞机飞过城市上空。", "s": ["above", "beyond", "across"], "core": "在上方越过，或数量盖过某个限度线之上。"}, {"w": "through", "c": "op", "zh": "穿过,通过", "en": "from one side to the other", "ex": "Walk through the door.", "exz": "穿过那扇门。", "s": ["across", "via", "by means of"], "core": "从里面穿过去，一头进去再从另一头出来。"}, {"w": "to", "c": "op", "zh": "到,向", "en": "toward or until", "ex": "I'm going to bed.", "exz": "我要去睡觉了。", "s": ["toward", "until", "into"], "core": "朝目标走去，方向一直指到某个终点那里。"}, {"w": "under", "c": "op", "zh": "在...下", "en": "beneath or lower than", "ex": "The cat hides under the bed.", "exz": "猫藏在床下。", "s": ["beneath", "below", "underneath"], "core": "压在或藏在下方，被上面的东西盖住遮住。"}, {"w": "up", "c": "op", "zh": "向上", "en": "to or in a higher position", "ex": "Look up at the sky.", "exz": "抬头看天空。", "s": ["upward", "above", "higher"], "core": "朝高处去，位置顺着方向一点点往上升。"}, {"w": "with", "c": "op", "zh": "和...一起", "en": "together or accompanied by", "ex": "Come with me.", "exz": "跟我来。", "s": ["alongside", "together with", "including"], "core": "和某人某物在一起，动作或状态彼此相伴。"}, {"w": "as", "c": "op", "zh": "作为,当...时", "en": "in the role of or while", "ex": "He works as a teacher.", "exz": "他当老师。", "s": ["like", "while", "because"], "core": "把人或事放进某个身份、样子，或同一时间里。"}, {"w": "for", "c": "op", "zh": "为了,因为", "en": "intended for or because of", "ex": "This gift is for you.", "exz": "这礼物是给你的。", "s": ["because of", "intended for", "on behalf of"], "core": "心思或用途朝向某人某事，背后带着原因。"}, {"w": "of", "c": "op", "zh": "...的", "en": "belonging to or related to", "ex": "A friend of mine.", "exz": "我的一个朋友。", "s": ["belonging to", "from", "about"], "core": "把一个东西连到它的所属、来源或组成上。"}, {"w": "till", "c": "op", "zh": "直到", "en": "up to a certain time", "ex": "Wait till noon.", "exz": "等到中午。", "s": ["until", "up to", "through"], "core": "时间一路延到某个点，到了那里才停下来。"}, {"w": "than", "c": "op", "zh": "比", "en": "used in comparisons", "ex": "She is taller than me.", "exz": "她比我高。", "s": ["compared to", "versus", "over"], "core": "把两边拉出来比较，看哪一边更怎样一些。"}, {"w": "a", "c": "op", "zh": "一个", "en": "indefinite article, one of", "ex": "I saw a dog.", "exz": "我看见一只狗。", "s": ["one", "any", "some"], "core": "从同类中随手拎出一个，不指定具体是哪一个。"}, {"w": "the", "c": "op", "zh": "那个,这个", "en": "definite article, specific", "ex": "The book is on the desk.", "exz": "那本书在桌上。", "s": ["this", "that", "said"], "core": "手指点向已知道的那一个，不是随便一个。"}, {"w": "all", "c": "op", "zh": "全部,所有", "en": "the whole quantity of", "ex": "All children love play.", "exz": "所有孩子都爱玩。", "s": ["every", "entire", "whole"], "core": "把一整堆都收进来，一个也不落在外面。"}, {"w": "any", "c": "op", "zh": "任何", "en": "one or some, no matter which", "ex": "Do you have any money?", "exz": "你有钱吗?", "s": ["some", "every", "whichever"], "core": "随便哪一个都可以，不需要先挑定对象。"}, {"w": "every", "c": "op", "zh": "每个", "en": "each one without exception", "ex": "Every day brings hope.", "exz": "每天都带来希望。", "s": ["each", "all", "any"], "core": "一个接一个全算进去，没有任何一个漏掉。"}, {"w": "little", "c": "op", "zh": "少,小", "en": "small in amount or size", "ex": "Add a little salt.", "exz": "加一点点盐。", "s": ["small", "slight", "tiny"], "core": "数量或尺寸很小，只占很少的一点点空间。"}, {"w": "much", "c": "op", "zh": "许多,大量", "en": "a large amount of", "ex": "Thank you very much.", "exz": "非常感谢你。", "s": ["a lot", "plenty", "greatly"], "core": "量堆得很多，感觉分量很足很满很重。"}, {"w": "no", "c": "op", "zh": "不,没有", "en": "negation or refusal", "ex": "No water is left.", "exz": "没有水剩下了。", "s": ["not", "none", "zero"], "core": "把可能性关掉，留下空无、拒绝或不存在。"}, {"w": "other", "c": "op", "zh": "其他的,另外的", "en": "different or additional", "ex": "Try the other door.", "exz": "试试另一扇门。", "s": ["another", "different", "alternative"], "core": "从眼前这个换到另一个不同的对象那边。"}, {"w": "some", "c": "op", "zh": "一些", "en": "an unspecified amount", "ex": "Have some tea.", "exz": "喝点茶吧。", "s": ["a few", "several", "any"], "core": "拿出一点或几个，但不把全部数量说清楚。"}, {"w": "such", "c": "op", "zh": "这样的", "en": "of that kind or degree", "ex": "Such a kind man!", "exz": "多么善良的人啊!", "s": ["like that", "this kind of", "so"], "core": "把眼前东西归到这种样子、这种程度里。"}, {"w": "that", "c": "op", "zh": "那个", "en": "referring to something distant", "ex": "That book is mine.", "exz": "那本书是我的。", "s": ["which", "the one", "yon"], "core": "手指向较远处，或指回已经提到的那个东西。"}, {"w": "this", "c": "op", "zh": "这个", "en": "referring to something near", "ex": "This is my house.", "exz": "这是我家。", "s": ["the present", "the current", "here"], "core": "手指向眼前近处，或正在谈的这个东西。"}, {"w": "I", "c": "op", "zh": "我", "en": "the speaker himself or herself", "ex": "I love reading.", "exz": "我喜欢阅读。", "s": ["me", "myself", "self"], "core": "说话的人把自己放在句子中心，从自己出发。"}, {"w": "he", "c": "op", "zh": "他", "en": "a male person previously mentioned", "ex": "He is my brother.", "exz": "他是我兄弟。", "s": ["him", "that man", "the male"], "core": "把话里的男性单独拎出来，继续指向他。"}, {"w": "you", "c": "op", "zh": "你,你们", "en": "the person spoken to", "ex": "You are very kind.", "exz": "你真好。", "s": ["thou", "ye", "one"], "core": "说话时把目光对准听话的人，让话落到对方身上。"}, {"w": "who", "c": "op", "zh": "谁", "en": "asking which person", "ex": "Who is that man?", "exz": "那个人是谁?", "s": ["which person", "what person", "whom"], "core": "把问题投向某个人，追问到底是哪一位。"}, {"w": "and", "c": "op", "zh": "和,与", "en": "connecting two similar things", "ex": "Tom and Jerry.", "exz": "汤姆和杰瑞。", "s": ["plus", "also", "as well as"], "core": "把两个想法或东西并排接上，让它们同在。"}, {"w": "because", "c": "op", "zh": "因为", "en": "giving a reason", "ex": "I'm late because of traffic.", "exz": "我迟到是因为堵车。", "s": ["since", "as", "due to"], "core": "在事情后面接上一条原因，说明为什么会这样。"}, {"w": "but", "c": "op", "zh": "但是", "en": "introducing a contrast", "ex": "Small but strong.", "exz": "小但强壮。", "s": ["yet", "however", "though"], "core": "前后方向忽然一转，后面挡住前面的预期。"}, {"w": "or", "c": "op", "zh": "或者", "en": "presenting alternatives", "ex": "Tea or coffee?", "exz": "茶还是咖啡?", "s": ["either", "alternatively", "otherwise"], "core": "摆出几条可能的路，让人从中挑选一条。"}, {"w": "if", "c": "op", "zh": "如果", "en": "introducing a condition", "ex": "If it rains, stay home.", "exz": "如果下雨就待在家。", "s": ["provided that", "when", "supposing"], "core": "先放一个条件，条件成立时事情才往下走。"}, {"w": "though", "c": "op", "zh": "尽管", "en": "despite the fact that", "ex": "Though tired, she smiled.", "exz": "尽管累,她还是笑了。", "s": ["although", "even if", "despite"], "core": "先承认阻碍还在，事情却仍然照样发生。"}, {"w": "while", "c": "op", "zh": "当...时,虽然", "en": "during the time that", "ex": "Read while you eat.", "exz": "边吃边读。", "s": ["during", "whereas", "as"], "core": "两件事在同一段时间里一起并行发生。"}, {"w": "how", "c": "op", "zh": "怎样,如何", "en": "in what way or manner", "ex": "How do you do it?", "exz": "你是怎么做的?", "s": ["in what way", "by what means", "what way"], "core": "追问动作走哪条路、用什么方式完成它。"}, {"w": "when", "c": "op", "zh": "什么时候", "en": "at what time", "ex": "When did you arrive?", "exz": "你什么时候到的?", "s": ["at what time", "once", "as soon as"], "core": "把问题钉到时间点上，问事情何时发生。"}, {"w": "where", "c": "op", "zh": "在哪里", "en": "in or at what place", "ex": "Where is the key?", "exz": "钥匙在哪儿?", "s": ["at what place", "wherever", "at the place"], "core": "把问题钉到地点上，问东西到底落在哪里。"}, {"w": "why", "c": "op", "zh": "为什么", "en": "for what reason", "ex": "Why are you sad?", "exz": "你为什么难过?", "s": ["for what reason", "how come", "wherefore"], "core": "往事情背后追，寻找推动它发生的原因。"}, {"w": "again", "c": "op", "zh": "再一次", "en": "one more time", "ex": "Try again later.", "exz": "待会儿再试。", "s": ["once more", "anew", "afresh"], "core": "同一个动作或情况重新出现，再来一遍。"}, {"w": "ever", "c": "op", "zh": "曾经,永远", "en": "at any time, always", "ex": "Have you ever been to Paris?", "exz": "你去过巴黎吗?", "s": ["always", "at any time", "forever"], "core": "把时间范围打开，问任意时候是否发生。"}, {"w": "far", "c": "op", "zh": "远", "en": "at a great distance", "ex": "How far is the station?", "exz": "车站有多远?", "s": ["distant", "remote", "afar"], "core": "距离被拉长，离这里或目标变得很远很远。"}, {"w": "forward", "c": "op", "zh": "向前", "en": "toward the front", "ex": "Step forward, please.", "exz": "请向前走一步。", "s": ["onward", "ahead", "frontward"], "core": "朝脸所向的前方推进，往前走出一步去。"}, {"w": "here", "c": "op", "zh": "这里", "en": "in or to this place", "ex": "Come here, please.", "exz": "请到这里来。", "s": ["at this place", "hither", "in this spot"], "core": "说话者所在或手正指着的这个地方这里。"}, {"w": "near", "c": "op", "zh": "靠近", "en": "at a short distance", "ex": "He lives near the park.", "exz": "他住在公园附近。", "s": ["close", "beside", "nearby"], "core": "距离很短，已经靠得几乎贴到身边附近。"}, {"w": "now", "c": "op", "zh": "现在", "en": "at the present time", "ex": "Do it now.", "exz": "现在就做。", "s": ["currently", "at present", "right away"], "core": "时间落在正在发生的这一刻，不是过去将来。"}, {"w": "out", "c": "op", "zh": "在外,出去", "en": "away from inside", "ex": "Go out and play.", "exz": "出去玩吧。", "s": ["outside", "outward", "beyond"], "core": "从里面离开，跨出边界来到外面空间。"}, {"w": "still", "c": "op", "zh": "仍然", "en": "continuing up to now", "ex": "He is still working.", "exz": "他还在工作。", "s": ["yet", "even now", "nonetheless"], "core": "到现在还没有停，原来的状态继续留着。"}, {"w": "then", "c": "op", "zh": "那时,然后", "en": "at that time or next", "ex": "First eat, then sleep.", "exz": "先吃饭,然后睡觉。", "s": ["next", "afterward", "at that time"], "core": "时间走到那一刻，或下一步顺着接上来。"}, {"w": "there", "c": "op", "zh": "那里", "en": "in or at that place", "ex": "Sit over there.", "exz": "坐到那边去。", "s": ["at that place", "yonder", "thither"], "core": "指向离说话者较远处的那个地方那边。"}, {"w": "together", "c": "op", "zh": "一起", "en": "in one group or company", "ex": "We sing together.", "exz": "我们一起唱歌。", "s": ["jointly", "collectively", "in unison"], "core": "分开的东西聚到一处，彼此靠拢一起行动。"}, {"w": "well", "c": "op", "zh": "好,健康地", "en": "in a good way", "ex": "She speaks English well.", "exz": "她英语说得好。", "s": ["good", "nicely", "properly"], "core": "事情进行得顺、稳、好，身体状态也正常。"}, {"w": "almost", const CATS = {
  op: { label: '操作词', count: 100 },
  gt: { label: '通用词', count: 400 },
  pt: { label: '图示词', count: 200 },
  qg: { label: '性质词', count: 100 },
  qo: { label: '反义对', count: 50 }
};

// ==================== STATE ====================
let currentCat = 'all';
let roundPool = [];         // Words in current round (20 unseen)
let currentIndex = 0;
let reviewMode = false;
let progress = {};          // {word: {status: 'known'|'unknown', seen: true|false}}
const ROUND_SIZE = 20;

function loadProgress() {
  try {
    let data = JSON.parse(localStorage.getItem('ogden850_v2') || '{}');
    // Migrate from v1 format: {word: 'known'} -> {word: {status: 'known', seen: true}}
    const firstKey = Object.keys(data)[0];
    if (firstKey && typeof data[firstKey] === 'string') {
      const migrated = {};
      Object.keys(data).forEach(w => {
        migrated[w] = {status: data[w], seen: true};
      });
      localStorage.setItem('ogden850_v2', JSON.stringify(migrated));
      return migrated;
    }
    return data;
  } catch(e) { return {}; }
}
function saveProgress(p) {
  localStorage.setItem('ogden850_v2', JSON.stringify(p));
}
function getStatus(word) {
  const entry = progress[word];
  if (!entry || !entry.seen) return 'new';
  return entry.status;
}
function isSeen(word) {
  return progress[word] && progress[word].seen === true;
}
function countByStatus(filterCat) {
  let total = 0, seen = 0, known = 0, unknown = 0;
  const pool = filterCat === 'all' ? WORDS : WORDS.filter(w => w.c === filterCat);
  pool.forEach(w => {
    total++;
    if (isSeen(w.w)) seen++;
    if (getStatus(w.w) === 'known') known++;
    if (getStatus(w.w) === 'unknown') unknown++;
  });
  return {total, seen, known, unknown, fresh: total - seen};
}

// ==================== BUILD TABS ====================
function buildTabs() {
  const tabs = document.getElementById('tabs');
  tabs.innerHTML = '';
  const categories = [['all', '全部 850', 850], ...Object.entries(CATS).map(([k,v]) => [k, v.label, v.count])];
  categories.forEach(([key, label, count]) => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (key === currentCat ? ' active' : '');
    btn.innerHTML = label + ' <span class="count">' + count + '</span>';
    btn.onclick = () => selectCat(key);
    tabs.appendChild(btn);
  });
}

function selectCat(cat) {
  currentCat = cat;
  reviewMode = false;
  document.getElementById('btnReview').classList.remove('active-review');
  document.getElementById('btnReview').textContent = '复习模式';
  buildTabs();
  startNewRound();
}

// ==================== ROUND LOGIC ====================
function startNewRound() {
  progress = loadProgress();
  
  // Get unseen words for current category
  const allWords = currentCat === 'all' ? [...WORDS] : WORDS.filter(w => w.c === currentCat);
  const unseen = allWords.filter(w => !isSeen(w.w));
  
  if (unseen.length === 0) {
    // All words seen in this category
    roundPool = [];
    currentIndex = 0;
    updateCard();
    updateProgress();
    return;
  }
  
  // Pick ROUND_SIZE random unseen words
  const shuffled = [...unseen];
  for (let i = shuffled.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
  }
  roundPool = shuffled.slice(0, ROUND_SIZE);
  currentIndex = 0;
  
  updateCard();
  updateProgress();
}

function finishRound() {
  // Mark all words in current round as seen
  progress = loadProgress();
  roundPool.forEach(w => {
    if (!progress[w.w]) progress[w.w] = {status: 'unknown', seen: true};
    else progress[w.w].seen = true;
  });
  saveProgress(progress);
  
  const stats = countByStatus(currentCat);
  roundPool = [];
  currentIndex = 0;
  updateCard();
  updateProgress();
}

// ==================== UPDATE CARD ====================
function updateCard() {
  const card = document.getElementById('card');
  
  // All done
  if (roundPool.length === 0) {
    const stats = countByStatus(currentCat);
    if (stats.fresh === 0 && stats.total > 0) {
      document.getElementById('cardWord').textContent = '✓';
      document.getElementById('cardPhonetic').textContent = '';
      card.classList.remove('flipped');
      
      if (stats.unknown > 0 && !reviewMode) {
        document.getElementById('cardZh').textContent = '本轮单词已全部查看完毕';
        document.getElementById('cardEnDef').textContent = '';
        document.getElementById('cardCore').textContent = '已掌握: ' + stats.known + ' | 待复习: ' + stats.unknown + ' | 剩余新词: ' + stats.fresh;
        document.getElementById('cardEx').textContent = '点击下方按钮开始下一轮，或进入复习模式';
        document.getElementById('cardExZh').textContent = '';
        document.getElementById('stats').textContent = '';
      } else if (reviewMode) {
        document.getElementById('cardZh').textContent = '复习完成！';
        document.getElementById('cardEnDef').textContent = '';
        document.getElementById('cardCore').textContent = '已掌握: ' + stats.known + ' | 待复习: ' + stats.unknown;
        document.getElementById('cardEx').textContent = '';
        document.getElementById('cardExZh').textContent = '';
        document.getElementById('stats').textContent = stats.unknown === 0 ? '全部掌握！' : '还有 ' + stats.unknown + ' 个需要继续复习';
      } else {
        document.getElementById('cardZh').textContent = '全部单词已查看完毕！';
        document.getElementById('cardEnDef').textContent = '已掌握: ' + stats.known;
        document.getElementById('cardCore').textContent = stats.unknown > 0 ? '还有 ' + stats.unknown + ' 个需要复习' : '太棒了，全部掌握！';
        document.getElementById('cardEx').textContent = '';
        document.getElementById('cardExZh').textContent = '';
        document.getElementById('stats').textContent = '';
      }
    } else {
      document.getElementById('cardWord').textContent = '—';
      document.getElementById('cardPhonetic').textContent = '';
    }
    return;
  }
  
  const w = roundPool[currentIndex];
  card.classList.remove('flipped');
  
  document.getElementById('cardWord').textContent = w.w;
  const ipaData = IPA[w.w];
  document.getElementById('cardPhonetic').textContent = ipaData ? ipaData.uk : '';
  
  document.getElementById('cardZh').textContent = w.zh;
  document.getElementById('cardEnDef').textContent = w.en;
  document.getElementById('cardCore').textContent = w.core;
  document.getElementById('cardEx').textContent = '"' + w.ex + '"';
  document.getElementById('cardExZh').textContent = w.exz;
  
  updateProgress();
  updateRoundStats();
}

function flipCard() {
  if (roundPool.length === 0) return;
  const card = document.getElementById('card');
  card.classList.toggle('flipped');
}

function markWord(known) {
  if (roundPool.length === 0) return;
  
  progress = loadProgress();
  const w = roundPool[currentIndex];
  if (!progress[w.w]) progress[w.w] = {status: 'unknown', seen: false};
  progress[w.w].status = known ? 'known' : 'unknown';
  progress[w.w].seen = true;
  if (reviewMode) progress[w.w].lastReview = Date.now();
  saveProgress(progress);
  
  if (currentIndex < roundPool.length - 1) {
    currentIndex++;
    updateCard();
  } else {
    if (reviewMode) {
      startReviewRound();
    } else {
      finishRound();
    }
  }
}

function nextRound() {
  const stats = countByStatus(currentCat);
  if (stats.fresh > 0) {
    startNewRound();
  } else {
    alert('没有新词了！可以进入复习模式巩固不认识的内容。');
  }
}

// ==================== REVIEW MODE ====================
function toggleReview() {
  reviewMode = !reviewMode;
  const btn = document.getElementById('btnReview');
  if (reviewMode) {
    btn.classList.add('active-review');
    btn.textContent = '复习模式 ✓';
    startReviewRound();
  } else {
    btn.classList.remove('active-review');
    btn.textContent = '复习模式';
    const stats = countByStatus(currentCat);
    if (stats.fresh > 0) {
      startNewRound();
    } else {
      roundPool = [];
      currentIndex = 0;
      updateCard();
      updateProgress();
    }
  }
}

function startReviewRound() {
  progress = loadProgress();
  const allWords = currentCat === 'all' ? [...WORDS] : WORDS.filter(w => w.c === currentCat);
  const unknownWords = allWords.filter(w => getStatus(w.w) === 'unknown');
  
  if (unknownWords.length === 0) {
    roundPool = [];
    currentIndex = 0;
    updateCard();
    updateProgress();
    return;
  }
  
  // Review algorithm: interleaved retrieval with priority spacing
  // 1. Sort by last review timestamp (older first = higher priority)
  //    Words last seen longer ago get reviewed first
  // 2. If no timestamps exist (first review), randomize
  // 3. Mix in a few recent-unknown words (20%) to prevent forgetting
  
  const now = Date.now();
  unknownWords.forEach(w => {
    w._priority = progress[w.w].lastReview || 0;
  });
  
  // Sort: oldest review first (longer gap = more urgent)
  unknownWords.sort((a, b) => a._priority - b._priority);
  
  // Take top 80% from priority queue + 20% random for variety
  const prioritySize = Math.min(Math.ceil(unknownWords.length * 0.8), ROUND_SIZE);
  const priorityPool = unknownWords.slice(0, prioritySize);
  
  // If we have extra slots, fill with random from remaining
  let reviewPool = [...priorityPool];
  if (reviewPool.length < ROUND_SIZE && unknownWords.length > prioritySize) {
    const remaining = unknownWords.slice(prioritySize);
    const shuffled = [...remaining].sort(() => Math.random() - 0.5);
    const extra = shuffled.slice(0, ROUND_SIZE - reviewPool.length);
    reviewPool = reviewPool.concat(extra);
  }
  
  // Final shuffle to interleave priorities (avoid showing all oldest first)
  for (let i = reviewPool.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [reviewPool[i], reviewPool[j]] = [reviewPool[j], reviewPool[i]];
  }
  
  roundPool = reviewPool;
  currentIndex = 0;
  updateCard();
  updateProgress();
}



// ==================== PROGRESS ====================
function updateProgress() {
  const stats = countByStatus(currentCat);
  const pct = stats.total > 0 ? Math.round((stats.seen / stats.total) * 100) : 0;
  
  document.getElementById('progressLabel').textContent = 
    '已查看 ' + stats.seen + '/' + stats.total + ' | 掌握 ' + stats.known + ' | 待复习 ' + stats.unknown;
  document.getElementById('progressPercent').textContent = pct + '%';
  document.getElementById('progressFill').style.width = pct + '%';
}

function updateRoundStats() {
  if (roundPool.length === 0) return;
  const roundSize = Math.min(ROUND_SIZE, roundPool.length);
  document.getElementById('stats').textContent = 
    '本轮 ' + (currentIndex + 1) + '/' + roundSize + 
    (reviewMode ? ' · 复习模式' : ' · 新词学习');
}

// ==================== EXPORT / IMPORT ====================
function exportProgress() {
  const p = loadProgress();
  const stats = countByStatus('all');
  const data = {
    version: 2,
    date: new Date().toISOString(),
    progress: p,
    stats: stats
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'ogden850_progress_' + new Date().toISOString().slice(0,10) + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function importProgress(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (data.progress && typeof data.progress === 'object') {
        const existing = loadProgress();
        const merged = {...existing, ...data.progress};
        saveProgress(merged);
        progress = merged;
        const stats = countByStatus(currentCat);
        alert('导入成功！\n已查看: ' + stats.seen + '/' + stats.total + '\n掌握: ' + stats.known + '\n待复习: ' + stats.unknown);
        if (reviewMode) { startReviewRound(); }
        else { startNewRound(); }
      } else {
        alert('文件格式不正确。');
      }
    } catch(err) {
      alert('读取失败: ' + err.message);
    }
  };
  reader.readAsText(file);
}

function resetProgress() {
  if (confirm('确定要清空所有学习进度吗？')) {
    localStorage.removeItem('ogden850_v2');
    progress = {};
    reviewMode = false;
    document.getElementById('btnReview').classList.remove('active-review');
    document.getElementById('btnReview').textContent = '复习模式';
    startNewRound();
  }
}

// ==================== SPEECH ====================
let _speechSynth = null;
let _engVoice = null;

function getSynth() {
  if (!_speechSynth) {
    _speechSynth = window.speechSynthesis;
    const voices = _speechSynth.getVoices();
    _engVoice = voices.find(v => v.lang.startsWith('en') && v.name.includes('Google')) ||
                voices.find(v => v.lang.startsWith('en-US')) ||
                voices.find(v => v.lang.startsWith('en-GB')) ||
                voices.find(v => v.lang.startsWith('en'));
  }
  return _speechSynth;
}

function getEngVoice() {
  if (!_engVoice) {
    const voices = getSynth().getVoices();
    _engVoice = voices.find(v => v.lang.startsWith('en') && v.name.includes('Google')) ||
                voices.find(v => v.lang.startsWith('en-US')) ||
                voices.find(v => v.lang.startsWith('en-GB')) ||
                voices.find(v => v.lang.startsWith('en'));
  }
  return _engVoice;
}

function speak(text) {
  if (!text) return;
  const synth = getSynth();
  synth.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.voice = getEngVoice();
  utter.rate = 0.85;
  utter.pitch = 1;
  synth.speak(utter);
}

function speakWord() {
  if (roundPool.length === 0) return;
  speak(roundPool[currentIndex].w);
}

function speakExample() {
  if (roundPool.length === 0) return;
  speak(roundPool[currentIndex].ex.replace(/^"|"$/g, ''));
}

if (window.speechSynthesis) {
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged = () => { _engVoice = null; };
}

// ==================== KEYBOARD ====================
document.addEventListener('keydown', e => {
  if (roundPool.length === 0) {
    if (e.code === 'KeyN') { e.preventDefault(); nextRound(); }
    return;
  }
  if (e.code === 'Space' || e.code === 'ArrowDown') {
    e.preventDefault();
    const card = document.getElementById('card');
    if (!card.classList.contains('flipped')) flipCard();
  }
  if (document.getElementById('card').classList.contains('flipped')) {
    if (e.code === 'ArrowLeft') markWord(false);
    if (e.code === 'ArrowRight') markWord(true);
  }
});// ==================== INIT ====================
(function init() {
  // Restore theme
  const saved = localStorage.getItem('ogden850_theme');
  if (saved === 'light') document.body.classList.add('light');

  progress = loadProgress();
  buildTabs();
  startNewRound();
})();
